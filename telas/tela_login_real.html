
<style>
*{box-sizing:border-box;margin:0;padding:0}
.screen{background:hsl(210,40%,96.1%);min-height:520px;display:flex;align-items:center;justify-content:center;padding:2rem;font-family:system-ui,-apple-system,sans-serif}
.card{background:hsl(0,0%,100%);border:0.5px solid hsl(214.3,31.8%,91.4%);border-radius:0.5rem;padding:1.5rem;width:100%;max-width:360px}
.brand{border-bottom:0.5px solid hsl(214.3,31.8%,91.4%);padding-bottom:1rem;margin-bottom:1.25rem}
.brand-name{font-size:13px;font-weight:500;color:hsl(222.2,84%,4.9%)}
.brand-sub{font-size:10px;font-family:monospace;color:hsl(215.4,16.3%,46.9%);margin-top:2px}
h1{font-size:15px;font-weight:500;color:hsl(222.2,84%,4.9%);margin-bottom:4px}
.sub{font-size:12px;color:hsl(215.4,16.3%,46.9%);margin-bottom:1.25rem;line-height:1.5}
.field-label{font-size:12px;font-weight:500;color:hsl(215.4,16.3%,46.9%);display:block;margin-bottom:6px}
.input{height:40px;width:100%;border-radius:calc(0.5rem - 2px);border:1px solid hsl(214.3,31.8%,91.4%);background:hsl(0,0%,100%);padding:0 12px;font-size:13px;color:hsl(222.2,84%,4.9%);outline:none;margin-bottom:1rem;font-family:monospace}
.input:focus{border-color:hsl(221.2,83.2%,53.3%);box-shadow:0 0 0 1px hsl(221.2,83.2%,53.3%)}
.btn{height:40px;width:100%;border-radius:calc(0.5rem - 2px);border:0.5px solid hsl(222.2,84%,4.9%);background:hsl(0,0%,100%);font-size:13px;font-weight:500;color:hsl(222.2,84%,4.9%);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .15s}
.btn:hover{background:hsl(210,40%,96.1%)}
.note{font-size:11px;color:hsl(215.4,16.3%,46.9%);text-align:center;margin-top:1rem;line-height:1.6}
.sent{display:none;text-align:center;padding:.5rem 0}
.sent-icon{width:40px;height:40px;border-radius:50%;background:hsl(210,40%,96.1%);display:flex;align-items:center;justify-content:center;margin:0 auto .75rem;border:0.5px solid hsl(214.3,31.8%,91.4%)}
.sent-title{font-size:14px;font-weight:500;color:hsl(222.2,84%,4.9%);margin-bottom:4px}
.sent-sub{font-size:12px;color:hsl(215.4,16.3%,46.9%);line-height:1.5}
.link{color:hsl(221.2,83.2%,53.3%);cursor:pointer;text-decoration:underline}
</style>
<div class="screen">
  <div class="card">
    <div class="brand">
      <div class="brand-name">Credit Engine</div>
      <div class="brand-sub">AntecipaGov</div>
    </div>

    <div id="form-state">
      <h1>Entrar</h1>
      <p class="sub">Digite seu e-mail para receber o link de acesso.</p>
      <label class="field-label" for="email">E-mail</label>
      <input class="input" type="email" id="email" placeholder="nome@empresa.com.br" autocomplete="off">
      <button class="btn" onclick="send()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Enviar link de acesso
      </button>
      <p class="note">Link expira em 10 minutos · uso único · sem senha</p>
    </div>

    <div class="sent" id="sent-state">
      <div class="sent-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="hsl(215.4,16.3%,46.9%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      </div>
      <div class="sent-title">Link enviado</div>
      <p class="sent-sub">Verifique sua caixa de entrada em<br><strong id="email-out"></strong></p>
      <p class="note" style="margin-top:.75rem">Não recebeu? <span class="link" onclick="back()">Tentar novamente</span></p>
    </div>
  </div>
</div>
<script>
function send(){
  const v=document.getElementById('email').value||'nome@empresa.com.br';
  document.getElementById('email-out').textContent=v;
  document.getElementById('form-state').style.display='none';
  document.getElementById('sent-state').style.display='block';
}
function back(){
  document.getElementById('form-state').style.display='block';
  document.getElementById('sent-state').style.display='none';
}
</script>
